<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PatternLock</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{

background:#eef5ff;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.container{

width:450px;

max-width:95%;

background:white;

border-radius:24px;

padding:45px;

box-shadow:0 10px 35px rgba(0,0,0,.08);

text-align:center;

}

.logo{

font-size:60px;

margin-bottom:20px;

}

h1{

color:#2563eb;

font-size:38px;

margin-bottom:10px;

}

.subtitle{

color:#666;

margin-bottom:40px;

font-size:17px;

}

.button{

display:block;

width:100%;

padding:16px;

margin-top:18px;

background:#2563eb;

color:white;

text-decoration:none;

border-radius:14px;

font-size:18px;

transition:.25s;

}

.button:hover{

background:#1d4ed8;

transform:translateY(-2px);

}

.info{

margin-top:35px;

font-size:14px;

color:#888;

}

footer{

margin-top:25px;

font-size:12px;

color:#aaa;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

🔒

</div>

<h1>

PatternLock

</h1>

<p class="subtitle">

安全なパターン認証システム

</p>

<a class="button" href="login.html">

ログイン

</a>

<a class="button" href="register.html">

新規登録

</a>

<div class="info">

ブラウザ・スマートフォン対応

</div>

<footer>

Version 1.0.0

</footer>

</div>

</body>

</html>
